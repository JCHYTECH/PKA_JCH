<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">WildNexus - Satellite / Base / Cloud</title>
  <desc id="desc">Diagramme d'architecture separant le satellite P0, la base locale P1 et le cloud optionnel P1/P2.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7f2; }
      .lane { fill: #ffffff; stroke: #ccd8c7; stroke-width: 2; rx: 16; }
      .lane-title { font: 700 22px Arial, sans-serif; fill: #162018; }
      .box { fill: #fbfcfa; stroke: #6f8b4e; stroke-width: 2; rx: 10; }
      .box-p0 { stroke: #24543f; }
      .box-p1 { stroke: #6f8b4e; }
      .box-p2 { stroke: #b46b47; }
      .text { font: 600 16px Arial, sans-serif; fill: #162018; }
      .small { font: 500 13px Arial, sans-serif; fill: #5d6b61; }
      .arrow { stroke: #5d6b61; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 7; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#5d6b61"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <text x="48" y="54" class="lane-title">WildNexus - Architecture Satellite / Base / Cloud</text>
  <text x="48" y="82" class="small">P0 autonome terrain ; Base/Master P1 ; Cloud optionnel P1/P2</text>

  <rect class="lane" x="40" y="120" width="340" height="510"/>
  <rect class="lane" x="430" y="120" width="340" height="510"/>
  <rect class="lane" x="820" y="120" width="340" height="510"/>

  <text x="70" y="160" class="lane-title">P0 - Satellite Lite</text>
  <text x="460" y="160" class="lane-title">P1 - Base / Master</text>
  <text x="850" y="160" class="lane-title">P1/P2 - Cloud optionnel</text>

  <rect class="box box-p0" x="70" y="195" width="280" height="62"/>
  <text x="92" y="230" class="text">S1 Camera + IR</text>

  <rect class="box box-p0" x="70" y="282" width="280" height="62"/>
  <text x="92" y="317" class="text">S2 Detection evenementielle</text>

  <rect class="box box-p0" x="70" y="369" width="280" height="62"/>
  <text x="92" y="404" class="text">S3 Stockage local microSD</text>

  <rect class="box box-p0" x="70" y="456" width="280" height="62"/>
  <text x="92" y="491" class="text">S5 LoRa alertes + metadata</text>

  <rect class="box box-p0" x="70" y="543" width="280" height="62"/>
  <text x="92" y="578" class="text">S6 Wi-Fi maintenance</text>

  <rect class="box box-p1" x="460" y="225" width="280" height="62"/>
  <text x="482" y="260" class="text">B1 Collecte locale</text>

  <rect class="box box-p1" x="460" y="330" width="280" height="62"/>
  <text x="482" y="365" class="text">B2 Index evenements</text>

  <rect class="box box-p1" x="460" y="435" width="280" height="62"/>
  <text x="482" y="470" class="text">B3 BirdNET-Go / YOLO</text>

  <rect class="box box-p2" x="850" y="250" width="280" height="62"/>
  <text x="872" y="285" class="text">C1 Archive selective</text>

  <rect class="box box-p2" x="850" y="365" width="280" height="62"/>
  <text x="872" y="400" class="text">C2 Acces distant</text>

  <rect class="box box-p2" x="850" y="480" width="280" height="62"/>
  <text x="872" y="515" class="text">C4 Exports scientifiques</text>

  <path class="arrow" d="M210 257 L210 282"/>
  <path class="arrow" d="M210 344 L210 369"/>
  <path class="arrow" d="M210 431 L210 456"/>
  <path class="arrow dashed" d="M210 431 L210 543"/>
  <path class="arrow" d="M350 487 C390 487 410 256 460 256"/>
  <path class="arrow dashed" d="M350 400 C390 400 410 256 460 256"/>
  <path class="arrow" d="M600 287 L600 330"/>
  <path class="arrow" d="M600 392 L600 435"/>
  <path class="arrow" d="M740 466 C790 466 800 281 850 281"/>
  <path class="arrow" d="M990 312 L990 365"/>
  <path class="arrow" d="M990 427 L990 480"/>

  <text x="70" y="668" class="small">Regle cle : P0 doit rester utile sans Base/Master et sans Cloud.</text>
</svg>
